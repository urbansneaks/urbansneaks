<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Urban Sneaks</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: white;
}

/* HEADER */
header {
  display: flex;
  justify-content: space-between;
  padding: 15px 30px;
  border-bottom: 1px solid #eee;
}

header img {
  width: 110px;
}

/* HERO */
.hero {
  height: 70vh;
  background: url("https://images.unsplash.com/photo-1600185365483-26d7a4cc7519");
  background-size: cover;
  display: flex;
  align-items: center;
  padding: 40px;
  color: white;
}

.hero h1 {
  font-size: 60px;
}

/* PRODUSE */
.products {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px,1fr));
  gap: 20px;
  padding: 30px;
}

.card {
  border: 1px solid #eee;
  padding: 10px;
  position: relative;
}

/* BADGE */
.badge {
  position: absolute;
  top: 10px;
  left: 10px;
  background: red;
  color: white;
  padding: 5px 10px;
  font-size: 12px;
}

/* BUTON */
button {
  width: 100%;
  padding: 10px;
  background: black;
  color: white;
  border: none;
  cursor: pointer;
}

/* REVIEW */
.reviews {
  padding: 30px;
  background: #f9f9f9;
  text-align: center;
}

.review {
  margin: 10px;
}

/* LIVRARE */
.delivery {
  text-align: center;
  padding: 20px;
  font-weight: bold;
}
</style>

<script>
function order(name, price){
  let msg = "Salut! Vreau sa comand: " + name + " - " + price + " RON";
  window.open("https://wa.me/40700000000?text=" + encodeURIComponent(msg));
}
</script>

</head>

<body>

<header>
<img src="logo.png">
</header>

<section class="hero">
<h1>SNEAKERS CARE ATRAG 🔥</h1>
</section>

<div class="delivery">
🚚 Livrare rapidă 24-48h | Plata la livrare
</div>

<section class="products">

<div class="card">
<div class="badge">HOT</div>
<img src="https://images.unsplash.com/photo-1542291026-7eec264c27ff">
<h3>Air Force 1</h3>
<p>450 RON</p>
<button onclick="order('Air Force 1',450)">Comandă</button>
</div>

<div class="card">
<div class="badge">SALE</div>
<img src="https://images.unsplash.com/photo-1525966222134-fcfa99b8ae77">
<h3>Jordan 1</h3>
<p>800 RON</p>
<button onclick="order('Jordan 1',800)">Comandă</button>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1519741497674-611481863552">
<h3>Yeezy Boost</h3>
<p>900 RON</p>
<button onclick="order('Yeezy',900)">Comandă</button>
</div>

</section>

<section class="reviews">
<h2>Recenzii clienți</h2>
<p class="review">⭐⭐⭐⭐⭐ „Calitate top!”</p>
<p class="review">⭐⭐⭐⭐⭐ „Au ajuns super rapid!”</p>
<p class="review">⭐⭐⭐⭐⭐ „Recomand!”</p>
</section>

</body>
</html>
