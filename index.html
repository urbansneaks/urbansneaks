<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Urban Sneaks</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0a0a0a;
  color: white;
}

/* HEADER */
header {
  background: #000;
  padding: 20px;
  text-align: center;
  border-bottom: 1px solid #222;
}

header img {
  width: 140px;
}

/* HERO */
.hero {
  height: 80vh;
  background: url("https://images.unsplash.com/photo-1542291026-7eec264c27ff");
  background-size: cover;
  background-position: center;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  position: relative;
  text-align: center;
}

.hero::before {
  content: "";
  position: absolute;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.6);
}

.hero * {
  position: relative;
}

.hero h1 {
  font-size: 50px;
}

.hero p {
  color: #ccc;
}

/* BUTTON */
.btn {
  margin-top: 20px;
  padding: 12px 25px;
  background: white;
  color: black;
  border: none;
  cursor: pointer;
  transition: 0.3s;
}

.btn:hover {
  transform: scale(1.1);
}

/* PRODUSE */
.products {
  padding: 40px;
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(250px,1fr));
  gap: 25px;
}

.card {
  background: #111;
  border-radius: 10px;
  overflow: hidden;
  transition: 0.3s;
}

.card:hover {
  transform: translateY(-8px);
}

.card img {
  width: 100%;
}

.info {
  padding: 15px;
}

.price {
  font-size: 18px;
}

/* BUTTON PRODUS */
button {
  width: 100%;
  padding: 10px;
  background: white;
  color: black;
  border: none;
  cursor: pointer;
}

button:hover {
  background: #ddd;
}

/* CART */
.cart {
  position: fixed;
  right: 0;
  top: 0;
  width: 260px;
  height: 100%;
  background: #050505;
  border-left: 1px solid #222;
  padding: 15px;
}

.cart h2 {
  text-align: center;
}

/* FOOTER */
footer {
  text-align: center;
  padding: 20px;
  border-top: 1px solid #222;
  color: #777;
}
</style>

<script>
let cart = [];

function addToCart(name, price) {
  cart.push({name, price});
  updateCart();
}

function updateCart() {
  let list = document.getElementById("cart-items");
  list.innerHTML = "";
  let total = 0;

  cart.forEach(item => {
    list.innerHTML += "<p>" + item.name + " - " + item.price + " RON</p>";
    total += item.price;
  });

  document.getElementById("total").innerText = "Total: " + total + " RON";
}

function order() {
  let message = "Comandă:%0A";
  cart.forEach(item => {
    message += item.name + " - " + item.price + " RON%0A";
  });

  window.open("https://wa.me/40700000000?text=" + message);
}
</script>

</head>

<body>

<header>
<img src="logo.png">
</header>

<section class="hero">
<h1>URBAN SNEAKS</h1>
<p>Sneakers premium. Stil autentic.</p>
<button class="btn" onclick="document.getElementById('shop').scrollIntoView()">Shop Now</button>
</section>

<section id="shop" class="products">

<div class="card">
<img src="https://images.unsplash.com/photo-1542291026-7eec264c27ff">
<div class="info">
<h3>Air Force 1</h3>
<p class="price">450 RON</p>
<button onclick="addToCart('Air Force 1',450)">Adaugă în coș</button>
</div>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1525966222134-fcfa99b8ae77">
<div class="info">
<h3>Jordan 1</h3>
<p class="price">800 RON</p>
<button onclick="addToCart('Jordan 1',800)">Adaugă în coș</button>
</div>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1519741497674-611481863552">
<div class="info">
<h3>Yeezy Boost</h3>
<p class="price">900 RON</p>
<button onclick="addToCart('Yeezy',900)">Adaugă în coș</button>
</div>
</div>

</section>

<div class="cart">
<h2>🛒 Coș</h2>
<div id="cart-items"></div>
<p id="total">Total: 0 RON</p>
<button onclick="order()">Finalizează</button>
</div>

<footer>
© 2026 Urban Sneaks
</footer>

</body>
</html>
