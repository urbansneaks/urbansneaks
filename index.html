<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Urban Sneaks</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #000;
  color: white;
}

/* HERO CU FUNDAL */
.hero {
  height: 100vh;
  background: url("https://images.unsplash.com/photo-1600185365483-26d7a4cc7519");
  background-size: cover;
  background-position: center;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  backdrop-filter: brightness(0.6);
  text-align: center;
  animation: fadeIn 2s;
}

.hero img {
  width: 200px;
  animation: slideDown 1s;
}

.hero h1 {
  font-size: 50px;
  margin: 10px;
  animation: fadeIn 2s;
}

.hero p {
  font-size: 18px;
  color: #ddd;
}

/* BUTON */
.btn {
  margin-top: 20px;
  padding: 15px 25px;
  background: red;
  border: none;
  color: white;
  font-size: 18px;
  cursor: pointer;
  border-radius: 5px;
  animation: pulse 2s infinite;
}

.btn:hover {
  background: darkred;
}

/* PRODUSE */
.products {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(250px,1fr));
  gap: 20px;
  padding: 40px;
  background: #111;
}

.card {
  background: #1a1a1a;
  border-radius: 10px;
  overflow: hidden;
  transform: translateY(50px);
  opacity: 0;
  animation: show 1s forwards;
}

.card img {
  width: 100%;
}

.info {
  padding: 15px;
}

.price {
  color: red;
  font-size: 20px;
}

button {
  width: 100%;
  padding: 10px;
  background: white;
  border: none;
  cursor: pointer;
}

button:hover {
  background: #ddd;
}

/* ANIMATII */
@keyframes fadeIn {
  from {opacity:0;}
  to {opacity:1;}
}

@keyframes slideDown {
  from {transform: translateY(-50px); opacity:0;}
  to {transform: translateY(0); opacity:1;}
}

@keyframes pulse {
  0% {transform: scale(1);}
  50% {transform: scale(1.05);}
  100% {transform: scale(1);}
}

@keyframes show {
  to {
    opacity:1;
    transform: translateY(0);
  }
}

/* FOOTER */
footer {
  text-align: center;
  padding: 20px;
  background: black;
  color: #777;
}
</style>

<script>
let cart = [];

function addToCart(name, price) {
  cart.push({name, price});
  alert(name + " adăugat în coș!");
}
</script>

</head>

<body>

<!-- HERO -->
<section class="hero">
<img src="logo.png">
<h1>URBAN SNEAKS</h1>
<p>Sneakers premium. Stil care atrage 🔥</p>
<button class="btn" onclick="document.getElementById('shop').scrollIntoView()">SHOP NOW</button>
</section>

<!-- PRODUSE -->
<section id="shop" class="products">

<div class="card">
<img src="https://via.placeholder.com/400">
<div class="info">
<h3>Air Force 1</h3>
<p class="price">450 RON</p>
<button onclick="addToCart('Air Force',450)">Adaugă</button>
</div>
</div>

<div class="card">
<img src="https://via.placeholder.com/400">
<div class="info">
<h3>Jordan 1</h3>
<p class="price">800 RON</p>
<button onclick="addToCart('Jordan',800)">Adaugă</button>
</div>
</div>

<div class="card">
<img src="https://via.placeholder.com/400">
<div class="info">
<h3>Yeezy Boost</h3>
<p class="price">900 RON</p>
<button onclick="addToCart('Yeezy',900)">Adaugă</button>
</div>
</div>

</section>

<footer>
© 2026 Urban Sneaks
</footer>

</body>
</html>
