<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>URBAN SNEAKS</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #000;
  color: white;
}

/* HEADER */
header {
  text-align: center;
  padding: 20px;
  border-bottom: 1px solid #222;
}

header img {
  width: 180px;
}

/* HERO */
.hero {
  text-align: center;
  padding: 40px;
}

.hero h1 {
  font-size: 40px;
}

/* PRODUCTS */
.products {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
  gap: 25px;
  padding: 20px;
}

.card {
  background: #111;
  border-radius: 10px;
  overflow: hidden;
  transition: 0.3s;
}

.card:hover {
  transform: scale(1.05);
}

.card img {
  width: 100%;
}

.info {
  padding: 15px;
}

.price {
  font-size: 20px;
  color: #fff;
}

/* BUTTON */
button {
  width: 100%;
  padding: 12px;
  background: white;
  color: black;
  border: none;
  font-weight: bold;
  cursor: pointer;
}

/* CART */
.cart {
  position: fixed;
  right: 0;
  top: 0;
  width: 260px;
  height: 100%;
  background: #050505;
  border-left: 1px solid #222;
  padding: 15px;
}

.cart h2 {
  text-align: center;
}

/* REVIEWS */
.reviews {
  padding: 20px;
  text-align: center;
}

.review {
  margin: 10px;
  color: #ccc;
}

/* FOOTER */
footer {
  text-align: center;
  padding: 20px;
  color: #777;
}
</style>

<script>
let cart = [];

function addToCart(name, price) {
  cart.push({name, price});
  updateCart();
}

function updateCart() {
  let list = document.getElementById("cart-items");
  list.innerHTML = "";
  let total = 0;

  cart.forEach(item => {
    list.innerHTML += "<p>" + item.name + " - " + item.price + " RON</p>";
    total += item.price;
  });

  document.getElementById("total").innerText = "Total: " + total + " RON";
}

function order() {
  let message = "Comandă:%0A";
  cart.forEach(item => {
    message += item.name + " - " + item.price + " RON%0A";
  });

  window.open("https://wa.me/40700000000?text=" + message);
}
</script>

</head>

<body>

<header>
<img src="logo.png">
</header>

<section class="hero">
<h1>URBAN SNEAKS</h1>
<p>🔥 Sneakers premium | Livrare rapidă 🔥</p>
</section>

<section class="products">

<div class="card">
<img src="https://via.placeholder.com/400">
<div class="info">
<h3>Air Force 1</h3>
<p class="price">450 RON</p>
<button onclick="addToCart('Air Force 1', 450)">Adaugă în coș</button>
</div>
</div>

<div class="card">
<img src="https://via.placeholder.com/400">
<div class="info">
<h3>Jordan 1</h3>
<p class="price">800 RON</p>
<button onclick="addToCart('Jordan 1', 800)">Adaugă în coș</button>
</div>
</div>

<div class="card">
<img src="https://via.placeholder.com/400">
<div class="info">
<h3>Yeezy Boost</h3>
<p class="price">900 RON</p>
<button onclick="addToCart('Yeezy', 900)">Adaugă în coș</button>
</div>
</div>

</section>

<div class="cart">
<h2>🛒 Coș</h2>
<div id="cart-items"></div>
<p id="total">Total: 0 RON</p>
<button onclick="order()">Finalizează</button>
</div>

<section class="reviews">
<h2>Recenzii</h2>
<p class="review">⭐⭐⭐⭐⭐ „Top calitate!”</p>
<p class="review">⭐⭐⭐⭐⭐ „Livrare rapidă!”</p>
<p class="review">⭐⭐⭐⭐⭐ „Recomand!”</p>
</section>

<footer>
© 2026 Urban Sneaks
</footer>

</body>
</html>
